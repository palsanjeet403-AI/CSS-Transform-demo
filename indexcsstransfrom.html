<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document CSS Transform</title>
    <style>
        .wrap {
            margin: 20px auto;
            max-width: 1000px;
            width: 90vw;
            display: flex;
            flex-flow: row wrap;
            justify-content: center;
            font-family: sans-serif;
        }

        .box {
            width: calc(30%);
            margin: 10px, 10px;
            justify-content: center;
            align-items: center;
            background-color: #ddd;
            cursor: pointer;
            line-height: 130PX;
            row-gap: 2px;
            text-align: center;
        }

        .blue {
            background-color: rgb(121, 191, 191);
            margin: 2px;
        }

        .scaleX {
            transform: scaleX(1);
            transition: transform 0.5s ease;

        }

        .box:hover .scaleX {
            transform: scaleX(2);
        }

        .scaleY {
            transform: scaleY(1);
            transition: transform 0.5s ease;
        }

        .box:hover .scaleY {
            transform: scaleY(2);
        }

        .scale {
            transform: scale(1);
            transition: transform 0.5s ease;
        }

        .box:hover .scale {
            transform: scale(2);
        }

        .translateX {
            transform: translateX(1);
            transition: transfrom 0.5s ease;
        }

        .box:hover .translateX {
            transform: translateX(30px);
        }

        .translateY {
            transform: translateY(1);
            transition: transform 0.5s ease;
        }

        .box:hover .translateY {
            transform: translateY(30px);
        }

        .translateZ {
            transform: translateZ(1);
            transition: transfrom 0.5s ease;
        }

        .box:hover .translateZ {
            transform: rotate3D(2, 3, 2, 45deg)translateZ(30px);
        }

        .translate3D {
            transform: translate3d(1) transition: transform 0.5s ease;

        }

        .box:hover .translate3D {
            transform: translate3D(2px, 2px, 2px)rotate3d(2, 2, 2, 90deg);
        }

        .matrix {
            transform: matrix(1px);
            transition: transform 0.5s ease;

        }

        .box:hover .matrix {
            transform: matrix(2, 1, -1, 1, 0, 1);
        }

        .matrix3D {
            transform: matrix3d(1px);
            transition: transform 0.5s ease;
        }

        .box:hover .matrix3D {
            transform: matrix3d(0.8535533905932737, 0.4999999999999999, 0.14644660940672619, 0, -0.4999999999999999, 0.7071067811865476, 0.4999999999999999, 0, 0.14644660940672619, -0.4999999999999999, 0.8535533905932737, 0, 22.62994231491119, -20.3223304703363, 101.3700576850888, 1);
        }

        .rotateX {
            transform: perspective(1) scaleZ(1) rotateX(0deg);
            transition: rotateX 0.5s ease;
        }

        .box:hover .rotateX {
            transform: perspective(500px) scaleZ(2) rotateX(80deg);
        }
        .rotateY {
            transform: perspective(1) scaleZ(1) rotateZ(0deg);
            transition: transform 0.5s ease;
        }
        .box:hover .rotateY {
            transform: rotateY(65deg) perspective(500px) scaleZ(2);
        }
        .rotate {
            transform: rotate(0deg);
            transition: transform 0.5s ease;
        }
        .box:hover .rotate {
            transform: rotate(190deg);
        }
        .skewX {
            transform: skewX(0deg);
            transition: transform 0.5s ease;
        }
        .box:hover .skewX {
            transform: skewX(30deg);
        }
        .skewY {
            transform: skewY(0deg);
            transition:all 0.5s ease;
        }
        .box:hover .skewY {
            transform: skewY(60deg);
        }
        .skew {
            transform: skew(0deg, 0deg);
            transition: transform 0.5s ease;
        }
        .box:hover .skew {
            transform: skew(30deg, 60deg);
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="box">
            <div class="blue scaleX">scaleX</div>

        </div>
        <div class="box">
            <div class="blue scaleY">ScaleY</div>
        </div>
        <div class="box">
            <div class="blue scale ">scale</div>
        </div>
        <div class="box">
            <div class="blue translateX">translateX</div>
        </div>
        <div class="box">
            <div class="blue translateY">translateY</div>
        </div>
        <div class="box">
            <div class="blue translateZ">translateZ</div>
        </div>
        <div class="box">
            <div class="blue translate3D">translate3D</div>
        </div>
        <div class="box">
            <div class="blue matrix">matrix</div>
        </div>
        <div class="box">
            <div class=" blue matrix3D">matrix3D</div>
        </div>
        <div class="box">
            <div class="blue rotateX">rotateX</div>
        </div>
        <div class="box">
            <div class="blue rotateY">rotateY</div>
        </div>
        <div class="box">
            <div class="blue rotate">rotate</div>
        </div>
        <div class="box">
            <div class="blue skewX">skewX</div>
        </div>
        <div class="box">
            <div class="blue skewY">skewY</div>
        </div>
        <div class="box">
            <div class="blue skew">skew</div>
        </div>
        <div </div>


</body>

</html>
